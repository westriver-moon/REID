seed: 42

dataset:
  name: sysumm01
  root: /home/cgv841/datasets/SYSU-MM01
  image_size: [288, 144]
  use_val: true
  train_augment: basic
  train_modality: ir

model:
  type: lastvit
  backbone_name: vit_base_patch16_224
  pretrained_path: /home/cgv841/ybj/pretrained/ViT_190k.pth
  drop_path_rate: 0.1
  topk: 16
  patch_embed:
    anchor_branch: 0
    branches:
      - patch_size: [16, 16]
        stride: [12, 12]
      - patch_size: [16, 8]
        stride: [12, 6]

loss:
  id_weight: 1.0
  triplet_weight: 1.0
  triplet_margin: 0.3
  tracklet_consistency_weight: 0.0
  cross_batch_memory_size: 0
  reset_memory_each_epoch: true

train:
  init_checkpoint: /home/cgv841/ybj/TVI-LFM/logs/sysu_ir_vcm_ir/tracklet_k2_ratio2_ep40/checkpoints/best.pth
  init_partial_classifier: true
  partial_classifier_rows: 395
  freeze_backbone_epochs: 0
  epochs: 12
  steps_per_epoch: 180
  num_ids: 8
  num_instances: 2
  num_workers: 8
  lr: 0.00001
  min_lr: 0.000001
  scheduler: warmup_cosine
  warmup_epochs: 2
  warmup_init_lr: 0.000001
  weight_decay: 0.05
  amp: true
  clip_grad_norm: 1.0
  eval_trials: 2
  full_coverage_priority: true
  min_epoch_coverage: 0.9

eval:
  dataset_root: /home/cgv841/datasets/SYSU-MM01
  batch_size: 128
  num_workers: 8
  num_trials: 10
  primary_mode: all
  extra_modes: [indoor]
  protocol: same_modality
  modality: ir
