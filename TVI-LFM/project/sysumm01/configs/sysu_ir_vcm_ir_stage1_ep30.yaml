seed: 42

dataset:
  name: sysu_ir_vcm_ir
  sysu_root: /home/cgv841/datasets/SYSU-MM01
  vcm_root: /home/cgv841/datasets/HITSZ-VCM
  vcm_tracklet_json: /home/cgv841/ybj/TVI-LFM/project/sysumm01/datasets/vcm_index/vcm_train_tracklets.json
  image_size: [288, 144]
  sysu_use_val: true
  vcm_frame_sampling: random
  vcm_frames_per_tracklet: 1
  train_augment: strong_reid

model:
  type: lastvit
  backbone_name: vit_base_patch16_224
  pretrained_path: /home/cgv841/ybj/pretrained/ViT_190k.pth
  drop_path_rate: 0.1
  topk: 16
  patch_embed:
    anchor_branch: 0
    branches:
      - patch_size: [16, 16]
        stride: [12, 12]
      - patch_size: [16, 8]
        stride: [12, 6]

loss:
  id_weight: 1.0
  triplet_weight: 1.0
  triplet_margin: 0.3
  tracklet_consistency_weight: 0.0
  cross_batch_memory_size: 0
  reset_memory_each_epoch: true

train:
  epochs: 30
  steps_per_epoch: 400
  sysu_ir_num_ids: 8
  vcm_ir_num_ids: 4
  num_instances: 2
  num_workers: 8
  lr: 0.00005
  min_lr: 0.000001
  scheduler: warmup_cosine
  warmup_epochs: 4
  warmup_init_lr: 0.000001
  weight_decay: 0.05
  amp: true
  clip_grad_norm: 1.0
  eval_trials: 2

eval:
  dataset_root: /home/cgv841/datasets/SYSU-MM01
  batch_size: 128
  num_workers: 8
  num_trials: 10
  primary_mode: all
  extra_modes: [indoor]
  protocol: same_modality
  modality: ir
