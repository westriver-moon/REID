seed: 42

dataset:
  name: external_rgb_ir
  image_size: [288, 144]
  train_augment: strong_reid
  frames_per_tracklet: 2
  frame_sampling: random
  indices:
    - name: vcm
      root: /home/cgv841/datasets/HITSZ-VCM
      index: /home/cgv841/ybj/TVI-LFM/project/sysumm01/datasets/vcm_index/vcm_train_tracklets.json
      expected_sha256: c8854abdbfd5e4933361fa43437be4874fcee8737d9caa1131af0d0f274786a3
      expected_metadata_filtered_frames: 745
      strict_vcm_metadata: true
    - name: regdb
      root: /home/cgv841/datasets/RegDB
      index: /home/cgv841/ybj/TVI-LFM/project/sysumm01/datasets/regdb_index/regdb_train_trial1.json
      strict_vcm_metadata: false

model:
  type: partial_shared_dual_stream
  backbone_name: vit_base_patch16_224
  pretrained_path: /home/cgv841/ybj/pretrained/ViT_190k.pth
  drop_path_rate: 0.1
  image_size: [288, 144]
  split_block: 4
  patch_embed:
    anchor_branch: 0
    branches:
      - patch_size: [16, 16]
        stride: [12, 12]
      - patch_size: [16, 8]
        stride: [12, 6]

loss:
  id_weight: 1.0
  triplet_weight: 0.0
  triplet_margin: 0.3
  tracklet_consistency_weight: 0.1
  cross_batch_memory_size: 0
  reset_memory_each_epoch: true
  cross_modal_metric:
    enabled: true
    start_epoch: 1
    contrast:
      enabled: true
      weight: 0.2
      temperature: 0.07
    triplet:
      enabled: true
      weight: 1.0
      margin: 0.3

train:
  epochs: 40
  steps_per_epoch: 800
  num_ids: 6
  num_instances: 2
  rgb_instances: 2
  ir_instances: 2
  source_sampling:
    vcm_ratio: 0.75
    regdb_ratio: 0.25
  num_workers: 8
  freeze_backbone_epochs: 0
  lr: 0.00002
  min_lr: 0.000001
  scheduler: warmup_cosine
  warmup_epochs: 3
  warmup_init_lr: 0.000001
  weight_decay: 0.0005
  amp: true
  clip_grad_norm: 1.0
  eval_trials: 1
  output_dir: /home/cgv841/ybj/TVI-LFM/logs/external_rgb_ir/vcm_regdb_partial_shared_split4_ep40_contrast

eval:
  dataset_root: /home/cgv841/datasets/SYSU-MM01
  batch_size: 128
  num_workers: 8
  num_trials: 10
  selection_split: val
  final_seed: 0
  final_split: test
  run_final_test: false
  primary_mode: all
  extra_modes: [indoor]
  protocol: cross_modality
