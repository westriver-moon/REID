seed: 42

dataset:
  name: sysu_ir_vcm_ir
  sysu_root: /home/cgv841/datasets/SYSU-MM01
  vcm_root: /home/cgv841/datasets/HITSZ-VCM
  vcm_tracklet_json: /home/cgv841/ybj/TVI-LFM/project/sysumm01/datasets/vcm_index/vcm_train_tracklets.json
  image_size: [288, 144]
  sysu_use_val: true
  vcm_frame_sampling: random
  vcm_frames_per_tracklet: 2
  train_augment: strong_reid
  schp_mask_root: /home/cgv841/ybj/TVI-LFM/data/schp_masks/lip
  schp_quality_index: /home/cgv841/ybj/TVI-LFM/data/schp_masks/lip/schp_quality_index.json
  schp_min_part_pixels: 4
  schp_allow_fallback: true

model:
  type: schp_part_patch_mean
  backbone_name: vit_base_patch16_224
  pretrained_path: /home/cgv841/ybj/pretrained/ViT_190k.pth
  drop_path_rate: 0.1
  part_classifier: true
  part_aggregation:
    num_parts: 4
    temperature: 0.7
    prior_bias: 1.0
    fusion_gamma_init: 0.8
    min_prior_pixels: 1.0
  patch_embed:
    anchor_branch: 0
    branches:
      - patch_size: [16, 16]
        stride: [12, 12]
      - patch_size: [16, 8]
        stride: [12, 6]

loss:
  source_aware: true
  sysu_id_weight: 1.0
  sysu_triplet_weight: 1.0
  vcm_id_weight: 0.2
  vcm_triplet_weight: 0.3
  part_id_weight: 0.05
  triplet_margin: 0.3
  tracklet_consistency_weight: 0.05
  cross_batch_memory_size: 0
  reset_memory_each_epoch: true

train:
  epochs: 40
  steps_per_epoch: 400
  sysu_ir_num_ids: 8
  vcm_ir_num_ids: 2
  num_instances: 2
  num_workers: 8
  lr: 0.00005
  min_lr: 0.000001
  scheduler: warmup_cosine
  warmup_epochs: 4
  warmup_init_lr: 0.000001
  weight_decay: 0.05
  amp: true
  clip_grad_norm: 1.0
  eval_trials: 2

eval:
  dataset_root: /home/cgv841/datasets/SYSU-MM01
  schp_mask_root: /home/cgv841/ybj/TVI-LFM/data/schp_masks/lip
  schp_quality_index: /home/cgv841/ybj/TVI-LFM/data/schp_masks/lip/schp_quality_index.json
  schp_min_part_pixels: 4
  schp_allow_fallback: true
  batch_size: 128
  num_workers: 8
  num_trials: 10
  primary_mode: all
  extra_modes: [indoor]
  protocol: same_modality
  modality: ir
