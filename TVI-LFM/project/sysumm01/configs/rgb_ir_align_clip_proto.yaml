seed: 42

dataset:
  name: sysumm01
  root: /home/cgv841/datasets/SYSU-MM01
  image_size: [288, 144]
  use_val: true
  train_modality: both
  train_augment: strong_reid

model:
  type: patch_mean
  backbone_name: vit_base_patch16_224
  pretrained_path: /home/cgv841/ybj/pretrained/ViT_190k.pth
  drop_path_rate: 0.1
  image_size: [288, 144]
  patch_embed:
    anchor_branch: 0
    branches:
      - patch_size: [16, 16]
        stride: [12, 12]
      - patch_size: [16, 8]
        stride: [12, 6]

loss:
  id_weight: 1.0
  triplet_weight: 1.0
  triplet_margin: 0.3
  cross_batch_memory_size: 0
  reset_memory_each_epoch: true
  rgb_ir_alignment:
    enabled: true
    start_epoch: 6
    clip_loss_weight: 0.1
    proto_loss_weight: 0.02
    temperature: 0.07

train:
  epochs: 20
  steps_per_epoch: 400
  num_ids: 8
  num_instances: 2
  num_workers: 8
  lr: 0.00002
  min_lr: 0.000001
  scheduler: warmup_cosine
  warmup_epochs: 2
  warmup_init_lr: 0.000001
  weight_decay: 0.05
  amp: true
  clip_grad_norm: 1.0
  eval_trials: 2
  init_checkpoint: /home/cgv841/ybj/TVI-LFM/logs/sysu_ir_vcm_ir/schp_full_s2_steps800_ep40/checkpoints/best.pth
  init_partial_classifier: true
  partial_classifier_rows: 395
  output_dir: /home/cgv841/ybj/TVI-LFM/logs/sysu_rgb_ir_align/clip_proto_ep20

eval:
  dataset_root: /home/cgv841/datasets/SYSU-MM01
  batch_size: 128
  num_workers: 8
  num_trials: 10
  primary_mode: all
  extra_modes: [indoor]
  protocol: cross_modality

